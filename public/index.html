<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>UNO ONLINE</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{background:#0f172a;color:white;text-align:center}
.card{width:60px;height:90px;margin:5px;display:inline-block;border-radius:10px;cursor:grab}
.red{background:red}.blue{background:blue}.green{background:green}.yellow{background:gold}.black{background:black}
#hand{position:fixed;bottom:0;width:100%}
#timerBox{position:fixed;top:10px;right:10px;width:150px;height:25px;background:#333;border-radius:10px}
#timerBar{height:100%;background:lime;width:100%}
</style>
</head>

<body>

<input id="name" placeholder="Tên">
<input id="roomInput" placeholder="Room">
<button onclick="create()">Tạo</button>
<button onclick="join()">Join</button>
<button onclick="start()">Start</button>

<div id="timerBox"><div id="timerBar"></div></div>

<div id="hand"></div>

<script>
const socket=io();
let currentRoom=null;
let draggedIndex=null;

function create(){ socket.emit('createRoom', name.value); }
function join(){
  currentRoom=roomInput.value;
  socket.emit('joinRoom',{roomId:currentRoom,name:name.value});
}
function start(){ socket.emit('startGame', currentRoom); }

socket.on('roomCreated', id=>{
  currentRoom=id;
  alert('Room: '+id);
});

socket.on('gameState', room=>{
  let me=room.players.find(p=>p.id===socket.id);
  hand.innerHTML='';

  me.hand.forEach((c,i)=>{
    let div=document.createElement('div');
    div.className='card '+c.color;
    div.innerText=c.value;
    div.draggable=true;
    div.ondragstart=()=>draggedIndex=i;
    hand.appendChild(div);
  });
});

document.body.ondrop=(e)=>{
  if(draggedIndex!=null){
    socket.emit('playCard',{roomId:currentRoom,index:draggedIndex});
  }
};

socket.on('timer', t=>{
  document.getElementById('timerBar').style.width=(t/15*100)+'%';
});

socket.on('winner', name=>{
  alert(name+' thắng!');
});
</script>

</body>
</html>
